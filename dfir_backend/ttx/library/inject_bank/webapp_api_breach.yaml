version: 1
injects:
  - id: WEBAPI-001
    label: Opening rules and exercise objectives framing
    tags:
      categories: ["Web Application / API Breach"]
      package_profiles: ["EXEC_90", "HALF_DAY", "FULL_DAY"]
      audiences: ["Executive", "Engineering", "Security", "Legal", "PR/Comms", "IT", "Product"]
      csf_functions: ["Govern", "Identify"]
      mitre_attack: []
      complexity: low
      redline_topics: []
    inject:
      delivery_method: Facilitator readout
      audience: All participants
      participant_prompt: "Welcome to the {CLIENT_ALIAS} tabletop focused on potential compromise of {CRITICAL_SERVICES}. Confirm this is a no-fault discussion, decisions are not precedent, and priorities align to {PRIMARY_OBJECTIVES}, {CROWN_JEWELS}, and {LEADERSHIP_CONCERNS}."
      expected_discussion:
        - "Shared understanding of scenario purpose, constraints, and decision focus."
        - "Agreement on balancing transparency, speed, and business continuity."
        - "Confirmation that assumptions should be challenged and logged."
      expected_decisions:
        - "Approve exercise guardrails, participation expectations, and decision logging approach."
        - "Confirm the top three business outcomes to protect during this scenario."
      evaluation_criteria:
        - "Participants can restate exercise rules and non-punitive intent."
        - "Business priorities and scope are explicitly acknowledged by all core roles."
      facilitator_notes: "Use this inject to establish psychological safety and decision discipline before technical details appear."
      evidence_refs: ["REF_NIST_SP_800_61_R3", "REF_OWASP_TOP10_2025"]

  - id: WEBAPI-002
    label: Incident command authority and escalation thresholds check
    tags:
      categories: ["Web Application / API Breach"]
      package_profiles: ["EXEC_90", "HALF_DAY", "FULL_DAY"]
      audiences: ["Executive", "Security", "Engineering", "Legal", "IT"]
      csf_functions: ["Govern", "Respond"]
      mitre_attack: []
      complexity: medium
      redline_topics: []
    inject:
      delivery_method: Leadership status prompt
      audience: Command team
      participant_prompt: "An active web/API incident is suspected at {CLIENT_ALIAS}. Clarify who is incident commander, who can approve high-impact actions, and what thresholds trigger executive, legal, and board-level escalation tied to {LEADERSHIP_CONCERNS}."
      expected_discussion:
        - "Decision rights for containment, customer messaging, and service-impacting actions."
        - "Escalation thresholds based on uncertainty, scope, and potential harm."
        - "Fallback authority if primary approvers are unavailable."
      expected_decisions:
        - "Name incident commander and deputies with clear delegated authorities."
        - "Approve escalation triggers and required notification pathways."
      evaluation_criteria:
        - "Roles and approvals are unambiguous across functions."
        - "Escalation triggers are measurable and practical under time pressure."
      facilitator_notes: "Push for explicit authority statements, not informal assumptions."
      evidence_refs: ["REF_NIST_SP_800_61_R3", "REF_CISA_SECURE_BY_DESIGN"]

  - id: WEBAPI-003
    label: API gateway and WAF anomaly triage decision
    tags:
      categories: ["Web Application / API Breach"]
      package_profiles: ["EXEC_90", "HALF_DAY", "FULL_DAY"]
      audiences: ["Security", "Engineering", "IT", "Product"]
      csf_functions: ["Detect", "Respond", "Identify"]
      mitre_attack: ["T1190"]
      complexity: medium
      redline_topics: []
    inject:
      delivery_method: SOC alert summary
      audience: Security and engineering leads
      participant_prompt: "Monitoring shows unusual API gateway/WAF behavior, including spikes in 4xx/5xx responses against endpoints supporting {CRITICAL_SERVICES}. Decide immediate triage actions, confidence level, and whether to declare an incident now or continue investigation."
      expected_discussion:
        - "Distinguishing malicious probing from customer or integration errors."
        - "Minimum evidence needed for incident declaration."
        - "Short-term safeguards that minimize customer disruption."
      expected_decisions:
        - "Set incident severity and whether to activate full response process."
        - "Approve immediate containment controls pending deeper validation."
      evaluation_criteria:
        - "Triage logic is risk-based and time-bounded."
        - "Decision includes explicit assumptions and confidence rating."
      facilitator_notes: "Emphasize decision quality under incomplete telemetry."
      evidence_refs: ["REF_NIST_SP_800_61_R3", "REF_OWASP_API_TOP10_2023_HOME", "REF_ATTACK_T1190_EXPLOIT_PUBLIC_FACING_APP"]

  - id: WEBAPI-004
    label: Customer-reported suspicious access concern
    tags:
      categories: ["Web Application / API Breach"]
      package_profiles: ["EXEC_90", "HALF_DAY", "FULL_DAY"]
      audiences: ["Executive", "Security", "Legal", "PR/Comms", "Product"]
      csf_functions: ["Identify", "Respond", "Govern"]
      mitre_attack: []
      complexity: medium
      redline_topics: []
    inject:
      delivery_method: Customer escalation ticket
      audience: Command team and communications
      participant_prompt: "A major customer reports seeing data that should not have been visible in their API workflow and requests an immediate statement. Determine triage priority, customer handling approach, and what can be communicated before root cause is confirmed."
      expected_discussion:
        - "How customer reports influence incident severity and response cadence."
        - "Balancing factual accuracy with urgency in external communications."
        - "Cross-team alignment between support, legal, and security."
      expected_decisions:
        - "Approve customer-facing holding statement boundaries."
        - "Set timeline for next update and ownership for evidence-backed communication."
      evaluation_criteria:
        - "Response is timely, consistent, and avoids speculative claims."
        - "Customer triage path is integrated with incident command decisions."
      facilitator_notes: "Focus on communication governance, not wording perfection."
      evidence_refs: ["REF_NIST_SP_800_61_R3", "REF_OWASP_TOP10_PROJECT_PAGE"]

  - id: WEBAPI-005
    label: Broken access control suspected in web tier
    tags:
      categories: ["Web Application / API Breach"]
      package_profiles: ["HALF_DAY", "FULL_DAY"]
      audiences: ["Engineering", "Security", "Product", "Executive"]
      csf_functions: ["Identify", "Protect", "Respond"]
      mitre_attack: ["T1190"]
      complexity: high
      redline_topics: []
    inject:
      delivery_method: Security architecture finding
      audience: Engineering, security, product leadership
      participant_prompt: "Internal review indicates a possible broken access control weakness exposing operations linked to {CROWN_JEWELS}. Determine how to scope impact quickly and decide whether to suspend affected capabilities pending validation."
      expected_discussion:
        - "Risk of continued operation versus abrupt feature interruption."
        - "Data and function-level exposure hypotheses to test first."
        - "Ownership split between product risk and security containment."
      expected_decisions:
        - "Approve immediate guardrails for high-risk authorization paths."
        - "Set criteria for pausing or continuing affected user journeys."
      evaluation_criteria:
        - "Decisions reflect business impact and exposure severity."
        - "Containment and product decisions are synchronized."
      facilitator_notes: "Anchor on executive-level risk choices, not code specifics."
      evidence_refs: ["REF_OWASP_TOP10_2025", "REF_OWASP_ASVS", "REF_NIST_SP_800_61_R3"]

  - id: WEBAPI-006
    label: API1 BOLA object ID manipulation risk
    tags:
      categories: ["Web Application / API Breach"]
      package_profiles: ["HALF_DAY", "FULL_DAY"]
      audiences: ["Engineering", "Security", "Product", "IT"]
      csf_functions: ["Identify", "Protect", "Respond"]
      mitre_attack: ["T1190"]
      complexity: high
      redline_topics: []
    inject:
      delivery_method: Penetration test escalation
      audience: API engineering and security
      participant_prompt: "Testing reveals API object identifiers may be manipulated to retrieve unauthorized records in {CRITICAL_SERVICES}. Decide immediate compensating controls, exposure validation scope, and customer-risk prioritization."
      expected_discussion:
        - "How broadly object-level authorization must be revalidated."
        - "Potential need for endpoint restrictions while fixes are prepared."
        - "Downstream implications for data trust and customer confidence."
      expected_decisions:
        - "Approve emergency controls on high-risk object access patterns."
        - "Set sequencing for validation of adjacent endpoints and services."
      evaluation_criteria:
        - "Response plan addresses systemic authorization risk, not single endpoint only."
        - "Business and technical owners share common risk language."
      facilitator_notes: "Encourage teams to avoid narrow-scope assumptions with BOLA-style flaws."
      evidence_refs: ["REF_OWASP_API1_2023_BOLA", "REF_OWASP_API_TOP10_2023_HOME", "REF_NIST_SP_800_61_R3"]

  - id: WEBAPI-007
    label: Hotfix versus rollback versus endpoint shutdown
    tags:
      categories: ["Web Application / API Breach"]
      package_profiles: ["EXEC_90", "HALF_DAY", "FULL_DAY"]
      audiences: ["Executive", "Engineering", "Security", "Product", "IT"]
      csf_functions: ["Respond", "Protect", "Govern"]
      mitre_attack: []
      complexity: high
      redline_topics: ["Availability versus exposure tradeoff"]
    inject:
      delivery_method: Incident decision brief
      audience: Command team
      participant_prompt: "An active vulnerability path likely affects {CROWN_JEWELS}. Engineering proposes three options: urgent hotfix, rollback to prior release, or temporary endpoint disablement. Decide which option to pursue and what risk is accepted across availability, integrity, and exposure."
      expected_discussion:
        - "Tradeoffs among recovery speed, regression risk, and exploitation window."
        - "Operational dependencies and customer commitments affected by each option."
        - "Decision checkpoints if chosen path fails."
      expected_decisions:
        - "Select primary mitigation path and fallback trigger."
        - "Approve internal and external messaging tied to chosen action."
      evaluation_criteria:
        - "Decision rationale explicitly maps to business risk appetite."
        - "Fallback conditions are pre-defined before implementation."
      facilitator_notes: "Ensure teams articulate acceptable residual risk, not just preferred engineering path."
      evidence_refs: ["REF_NIST_SP_800_61_R3", "REF_CISA_SECURE_BY_DESIGN"]

  - id: WEBAPI-008
    label: Logging and alerting gaps discovered
    tags:
      categories: ["Web Application / API Breach"]
      package_profiles: ["HALF_DAY", "FULL_DAY"]
      audiences: ["Security", "Engineering", "IT", "Executive"]
      csf_functions: ["Detect", "Respond", "Recover"]
      mitre_attack: []
      complexity: medium
      redline_topics: []
    inject:
      delivery_method: Detection coverage review
      audience: Security operations and engineering
      participant_prompt: "During investigation, teams discover key API and auth events are not sufficiently logged for rapid scoping. Decide immediate workarounds, confidence communication, and how to proceed with decision-making under telemetry gaps."
      expected_discussion:
        - "What minimum evidence is required to support high-impact decisions."
        - "Temporary compensating measures for visibility and monitoring."
        - "How uncertainty is conveyed to leadership and customers."
      expected_decisions:
        - "Approve short-term telemetry workaround plan and ownership."
        - "Set risk posture and communication language for known unknowns."
      evaluation_criteria:
        - "Teams avoid false certainty and document assumptions clearly."
        - "Workarounds are practical and tied to decision timelines."
      facilitator_notes: "Probe whether teams can continue decisively when data quality is imperfect."
      evidence_refs: ["REF_NIST_SP_800_61_R3", "REF_OWASP_ASVS"]

  - id: WEBAPI-009
    label: Public-facing exploitation suspected with mitigation sequencing
    tags:
      categories: ["Web Application / API Breach"]
      package_profiles: ["HALF_DAY", "FULL_DAY"]
      audiences: ["Security", "Engineering", "IT", "Executive", "Product"]
      csf_functions: ["Respond", "Protect", "Detect"]
      mitre_attack: ["T1190"]
      complexity: high
      redline_topics: []
    inject:
      delivery_method: Threat intel + SOC correlation
      audience: Incident command and technical leads
      participant_prompt: "Indicators suggest active exploitation of a public-facing web/API component. Determine sequencing for patching, compensating controls, and monitoring so risk is reduced quickly without destabilizing {CRITICAL_SERVICES}."
      expected_discussion:
        - "Order of operations between immediate blocking and durable remediation."
        - "How to prioritize affected environments and customer segments."
        - "Criteria for declaring exploitation contained."
      expected_decisions:
        - "Approve mitigation sequence with timeline and checkpoints."
        - "Define escalation if exploitation continues after first controls."
      evaluation_criteria:
        - "Sequence is realistic and reduces exposure promptly."
        - "Containment success criteria are explicit and testable."
      facilitator_notes: "Avoid implementation detail drift; keep focus on decision sequencing and risk."
      evidence_refs: ["REF_ATTACK_T1190_EXPLOIT_PUBLIC_FACING_APP", "REF_NIST_SP_800_61_R3", "REF_CISA_KEV_CATALOG"]

  - id: WEBAPI-010
