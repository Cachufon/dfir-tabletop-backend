      redline_topics: []
    inject:
      delivery_method: Authentication health alert
      audience: Security, identity, and product leads
      participant_prompt: "Authentication failures and irregular session behavior increase across user populations. Decide among forced reauthentication, step-up controls, selective session revocation, or full invalidation and evaluate impact on {PRIMARY_OBJECTIVES}."
      expected_discussion:
        - "Risk reduction versus user disruption and support load."
        - "How broadly containment should be applied under uncertainty."
        - "Messaging for customers and internal teams if login friction rises."
      expected_decisions:
        - "Select containment option and scope for session controls."
        - "Approve customer communication trigger for auth changes."
      evaluation_criteria:
        - "Containment decision is proportionate and documented."
        - "Business impact and abuse risk are explicitly balanced."
      facilitator_notes: "Drive a clear choice rather than prolonged preference debate."
      evidence_refs: ["REF_OWASP_TOP10_2025", "REF_NIST_SP_800_61_R3"]

