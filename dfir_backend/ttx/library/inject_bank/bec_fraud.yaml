  - id: BEC-FRAUD-006
    label: Potential mailbox compromise in finance leadership account
    tags:
      categories: [bec_fraud]
      package_profiles: [executive, half_day, full_day]
      audiences: [incident_response, finance, executive]
      csf_functions: [identify, respond]
      mitre_attack: [ATTACK:T1078, ATTACK:T1110]
      complexity: medium
      redline_topics: [mailbox_access, account_abuse, compromise_confidence]
    inject:
      delivery_method: soc_alert
      audience: incident_response_and_command_team
      participant_prompt: "Security monitoring shows anomalous sign-ins to a finance executive mailbox, including failed-password bursts followed by successful access. Decide immediate investigation priorities and interim account protections."
      expected_discussion:
        - Determining confidence that the account was compromised.
        - Prioritizing evidence review without delaying fraud containment.
        - Defining interim controls for sensitive finance mailboxes.
      expected_decisions:
        - Approve immediate mailbox access review and containment actions.
        - Set threshold for broader account protection measures.
      evaluation_criteria:
        - Teams tie containment decisions to observed risk indicators.
        - Investigation priorities are explicit and time-bounded.
      facilitator_notes: "Keep technical actions high-level and decision-oriented."
      evidence_refs: [REF_ATTACK_T1078_VALID_ACCOUNTS, REF_ATTACK_T1110_BRUTE_FORCE, REF_NIST_SP_800_61_R3]

