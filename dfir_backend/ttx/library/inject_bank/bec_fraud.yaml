version: 1
injects:
  - id: BEC-FRAUD-001
    label: BEC/fraud scenario opening and financial control priorities
    tags:
      categories: [bec_fraud]
      package_profiles: [executive, half_day, full_day]
      audiences: [executive, finance, legal, communications]
      csf_functions: [govern, identify]
      mitre_attack: []
      complexity: low
      redline_topics: [scenario_context, fraud_exposure, decision_scope]
    inject:
      delivery_method: facilitator_readout
      audience: all_participants
      participant_prompt: "At {CLIENT_ALIAS}, finance leadership receives notice of unusual payment activity tied to invoice updates and urgent transfer requests. Confirm command priorities, financial risk tolerance, and early decision boundaries."
      expected_discussion:
        - Aligning executives, finance, legal, and communications on immediate fraud risk posture.
        - Defining thresholds for payment holds versus business continuity exceptions.
        - Clarifying who can authorize urgent financial containment actions.
      expected_decisions:
        - Approve initial fraud response objectives and governance cadence.
        - Assign owners for executive updates and decision logging.
      evaluation_criteria:
        - Teams establish a shared fraud incident framing before tactical actions.
        - Authority boundaries for financial controls are explicit.
      facilitator_notes: "Use this opening inject to establish leadership governance for all profiles."
      evidence_refs: [REF_FBI_BEC, REF_IC3_BEC, REF_NIST_SP_800_61_R3]

  - id: BEC-FRAUD-002
    label: Suspicious invoice update and banking change request
    tags:
      categories: [bec_fraud]
      package_profiles: [executive, half_day, full_day]
      audiences: [finance, procurement, executive]
      csf_functions: [identify, respond]
      mitre_attack: [ATTACK:T1566]
      complexity: medium
      redline_topics: [invoice_change, bank_details, payment_risk]
    inject:
      delivery_method: finance_ticket
      audience: finance_and_procurement
      participant_prompt: "Accounts payable receives an urgent vendor request to update remittance details before an upcoming payment run. Decide whether to pause payment, what verification sequence to use, and when to escalate to leadership."
      expected_discussion:
        - Identifying fraud indicators in payment change requests.
        - Determining hold criteria for pending invoices.
        - Coordinating finance and procurement validation responsibilities.
      expected_decisions:
        - Approve immediate hold-or-release posture for affected invoices.
        - Assign verification owners and escalation timing.
      evaluation_criteria:
        - Payment controls are triggered quickly and consistently.
        - Teams articulate clear verification and escalation logic.
      facilitator_notes: "Push participants to describe practical controls, not generic caution."
      evidence_refs: [REF_FBI_BEC, REF_IC3_BEC, REF_ATTACK_T1566_PHISHING, REF_NIST_SP_800_61_R3]

  - id: BEC-FRAUD-003
    label: Executive impersonation wire urgency request
    tags:
      categories: [bec_fraud]
      package_profiles: [executive, half_day, full_day]
      audiences: [executive, finance, legal]
      csf_functions: [identify, govern, respond]
      mitre_attack: [ATTACK:T1566, ATTACK:T1078]
      complexity: medium
      redline_topics: [exec_impersonation, urgency_pressure, authorization_chain]
    inject:
      delivery_method: email_thread
      audience: command_team
      participant_prompt: "A message appearing to be from the CEO requests a confidential same-day wire transfer for a sensitive acquisition matter. Decide whether to stop processing, how to validate authenticity, and who can override standard controls."
      expected_discussion:
        - Evaluating social engineering pressure against policy requirements.
        - Confirming escalation pathways for executive impersonation attempts.
        - Balancing confidentiality requests with fraud safeguards.
      expected_decisions:
        - Approve immediate verification and payment suspension actions.
        - Define authority for any exception handling.
      evaluation_criteria:
        - Teams resist urgency pressure without bypassing controls.
        - Exception governance is specific and auditable.
      facilitator_notes: "Reinforce that urgency and confidentiality are common fraud levers."
      evidence_refs: [REF_FBI_BEC, REF_IC3_BEC, REF_ATTACK_T1566_PHISHING, REF_ATTACK_T1078_VALID_ACCOUNTS]

  - id: BEC-FRAUD-004
    label: Vendor impersonation with look-alike domain
    tags:
      categories: [bec_fraud]
      package_profiles: [executive, half_day, full_day]
      audiences: [finance, procurement, incident_response]
      csf_functions: [identify, respond]
      mitre_attack: [ATTACK:T1566]
      complexity: medium
      redline_topics: [vendor_impersonation, domain_spoofing, supplier_risk]
    inject:
      delivery_method: supplier_email
      audience: finance_and_procurement
      participant_prompt: "A top supplier submits revised invoice instructions from a near-match email domain and requests accelerated payment due to an audit deadline. Decide validation steps and whether to initiate broader supplier fraud checks."
      expected_discussion:
        - Identifying indicators of vendor impersonation.
        - Determining whether to expand review to recent high-value vendor changes.
        - Coordinating supplier relationship management while holding payment.
      expected_decisions:
        - Approve out-of-band supplier verification and invoice hold period.
        - Launch targeted review of similar vendor communications.
      evaluation_criteria:
        - Teams identify impersonation risk quickly.
        - Validation actions are proportional and repeatable.
      facilitator_notes: "Keep focus on business process integrity and fraud prevention."
      evidence_refs: [REF_FBI_BEC, REF_IC3_BEC, REF_ATTACK_T1566_PHISHING]

