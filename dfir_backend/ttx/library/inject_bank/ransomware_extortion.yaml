      audience: command_team
      participant_prompt: "Restoration planning highlights unresolved privileged credential risk. Decide whether to require staged credential/secret resets before each restore wave and how to handle business urgency."
      expected_discussion:
        - Sequencing recovery with identity hardening controls.
        - Estimating downtime added by access-control remediation.
        - Choosing exceptions and associated risk acceptance.
      expected_decisions:
        - Approve credential reset policy tied to restore waves.
        - Define emergency exception process and approval authority.
      evaluation_criteria:
        - Identity hardening is integrated into recovery execution.
        - Exceptions are controlled and justified.
      facilitator_notes: "Keep focus on valid-account risk reduction during recovery."
      evidence_refs: [REF_ATTACK_T1078_VALID_ACCOUNTS, REF_NIST_SP_800_61_R3, REF_CISA_STOPRANSOMWARE_GUIDE]

  - id: RANSOMWARE-EXTORTION-021
    label: Recovery integrity monitoring and relapse detection
